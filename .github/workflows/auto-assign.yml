name: Auto Assign
on:
  pull_request_target:
    types: [opened, ready_for_review, reopened]

jobs:
  run:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
    steps:
    - name: 'Auto-assign issue'
      uses: pozil/auto-assign-issue@v2
      with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          assignees: nihermann
          numOfAssignee: 1